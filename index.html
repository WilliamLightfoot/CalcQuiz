<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP Calc BC Formula Quiz</title>

<style>
:root {
  --bg:#0e0f11;--surface:#16181c;--surface2:#1e2026;--border:#2a2d35;
  --accent:#4f9eff;--accent-dim:#1a3a6a;--green:#3ecf8e;--green-dim:#0f3d28;
  --red:#f87171;--red-dim:#3d1515;--text:#e8eaf0;--text2:#8b90a0;--text3:#555a6a;
  --display:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--display);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 4rem;}
.header{width:100%;max-width:740px;display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);}
.logo{font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);}
.stats{display:flex;gap:1.5rem;font-size:13px;color:var(--text2);}
.stat-val{font-weight:700;color:var(--text);}
.stat-val.g{color:var(--green);}.stat-val.r{color:var(--red);}
.filter-bar{width:100%;max-width:740px;display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem;}
.fb{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--display);}
.fb.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.progress-bar{width:100%;max-width:740px;height:3px;background:var(--border);border-radius:2px;margin-bottom:1.5rem;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease;opacity:.5;}
.card{width:100%;max-width:740px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem 2.25rem;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);opacity:.6;}
.cat-tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);padding:3px 10px;border-radius:20px;margin-bottom:1.25rem;}
.q-text{font-size:15px;color:var(--text2);margin-bottom:.75rem;line-height:1.5;}
.formula-box{min-height:64px;display:flex;align-items:center;justify-content:center;padding:1rem 1.5rem;background:var(--surface2);border-radius:10px;border:1px solid var(--border);margin-bottom:2rem;font-size:1.15em;text-align:center;line-height:1.7;}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem;}
.choice{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:.9rem 1rem;color:var(--text);cursor:pointer;transition:border-color .15s,background .15s,transform .1s;text-align:left;line-height:1.6;font-size:.95em;}
.choice:hover:not(:disabled){border-color:var(--accent);background:#1a2030;transform:translateY(-1px);}
.choice:active:not(:disabled){transform:translateY(0);}
.choice-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--text3);display:block;margin-bottom:4px;font-family:var(--display);}
.choice.correct{border-color:var(--green);background:var(--green-dim);color:var(--green);}
.choice.correct .choice-lbl{color:var(--green);opacity:.7;}
.choice.wrong{border-color:var(--red);background:var(--red-dim);color:var(--red);}
.choice.wrong .choice-lbl{color:var(--red);opacity:.7;}
.choice.reveal{border-color:var(--green);background:var(--green-dim);color:var(--green);}
.choice.reveal .choice-lbl{color:var(--green);opacity:.7;}
.choice:disabled{cursor:default;transform:none;}
.feedback{min-height:44px;display:flex;align-items:center;gap:10px;font-size:14px;padding:.7rem 1rem;border-radius:8px;opacity:0;transition:opacity .2s;}
.feedback.show{opacity:1;}
.feedback.cfb{background:var(--green-dim);color:var(--green);}
.feedback.wfb{background:var(--red-dim);color:var(--red);}
.next-btn{display:none;margin-top:1.25rem;width:100%;padding:.85rem;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:var(--display);font-size:14px;font-weight:700;letter-spacing:.05em;cursor:pointer;transition:background .15s,transform .1s;}
.ans-box{margin-top:.75rem;padding:1rem 1.5rem;background:var(--green-dim);border:1.5px solid var(--green);border-radius:10px;color:var(--green);font-size:1.1em;text-align:center;line-height:1.7;justify-content:center;align-items:center;}
.next-btn:hover{background:#3a8ef0;transform:translateY(-1px);}
.next-btn.show{display:block;}
.streak-badge{display:none;position:fixed;top:1.5rem;right:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.6rem 1rem;font-size:13px;font-weight:700;color:var(--green);animation:sin .3s ease;}
@keyframes sin{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes mpop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
.shake{animation:shake .35s ease;}
.mjx-container{display:inline!important;}
@media(max-width:500px){.choices{grid-template-columns:1fr;}.card{padding:1.5rem;}.formula-box{font-size:1em;}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">AP Calc BC</div>
  <div class="stats">
    <span><span class="stat-val g" id="sc">0</span> correct</span>
    <span><span class="stat-val r" id="sw">0</span> wrong</span>
    <span><span class="stat-val" id="st">0</span> total</span>
  </div>
</div>

<div class="filter-bar" id="filter-bar"></div>
<div class="progress-bar"><div class="progress-fill" id="pfill" style="width:0%"></div></div>

<div class="card">
  <div class="cat-tag" id="q-cat">Derivatives</div>
  <div class="q-text" id="q-text">Loading...</div>
  <div class="formula-box" id="q-formula"></div>
  <div class="choices" id="choices"></div>
  <div class="feedback" id="feedback"></div>
  <div class="ans-box" id="ans-box" style="display:none"></div>
  <button class="next-btn" id="next-btn" onclick="next()">Next question →</button>
</div>

<div class="streak-badge" id="streak-badge"></div>

<div id="milestone-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;">
  <img id="milestone-img" src="" style="width:220px;height:220px;object-fit:contain;animation:mpop .35s cubic-bezier(.34,1.56,.64,1);">
  <div id="milestone-text" style="font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:#fff;text-align:center;animation:mpop .35s cubic-bezier(.34,1.56,.64,1);"></div>
  <div id="milestone-sub" style="font-family:'Syne',sans-serif;font-size:1rem;color:rgba(255,255,255,0.6);text-align:center;"></div>
</div>

      "\\(\\displaystyle\\sum_{n=0}^\\infty\\frac{x^n}{(2n)!} = 1+\\frac{x^2}{2!}+\\frac{x^4}{4!}+\\cdots\\)"]},

  {cat:"Series",q:"Maclaurin series for \\(\\sin x\\).",
   f:"\\(\\sin x = \\;?\\)",
   a:"\\(x-\\dfrac{x^3}{3!}+\\dfrac{x^5}{5!}-\\dfrac{x^7}{7!}+\\cdots\\)",
   d:["\\(1-\\dfrac{x^2}{2!}+\\dfrac{x^4}{4!}-\\dfrac{x^6}{6!}+\\cdots\\)",
      "\\(x+\\dfrac{x^3}{3!}+\\dfrac{x^5}{5!}+\\dfrac{x^7}{7!}+\\cdots\\)",
      "\\(x-\\dfrac{x^2}{2!}+\\dfrac{x^3}{3!}-\\dfrac{x^4}{4!}+\\cdots\\)"]},

  {cat:"Series",q:"Maclaurin series for \\(\\cos x\\).",
   f:"\\(\\cos x = \\;?\\)",
   a:"\\(1-\\dfrac{x^2}{2!}+\\dfrac{x^4}{4!}-\\dfrac{x^6}{6!}+\\cdots\\)",
   d:["\\(x-\\dfrac{x^3}{3!}+\\dfrac{x^5}{5!}-\\dfrac{x^7}{7!}+\\cdots\\)",
      "\\(1+\\dfrac{x^2}{2!}+\\dfrac{x^4}{4!}+\\dfrac{x^6}{6!}+\\cdots\\)",
      "\\(1-\\dfrac{x^2}{2!}+\\dfrac{x^3}{3!}-\\dfrac{x^4}{4!}+\\cdots\\)"]},

  {cat:"Series",q:"Maclaurin series for \\(\\dfrac{1}{1-x}\\).",
   f:"\\(\\dfrac{1}{1-x} = \\;?\\)",
   a:"\\(1+x+x^2+x^3+\\cdots\\), converges for \\(|x|<1\\)",
   d:["\\(1-x+x^2-x^3+\\cdots\\), converges for \\(|x|<1\\)",
      "\\(1+x+\\dfrac{x^2}{2!}+\\dfrac{x^3}{3!}+\\cdots\\)",
      "\\(1+x+\\dfrac{x^2}{2}+\\dfrac{x^3}{3}+\\cdots\\)"]},

  {cat:"Series",q:"Maclaurin series for \\(\\ln(1+x)\\).",
   f:"\\(\\ln(1+x) = \\;?\\)",
   a:"\\(x-\\dfrac{x^2}{2}+\\dfrac{x^3}{3}-\\dfrac{x^4}{4}+\\cdots\\)",
   d:["\\(x+\\dfrac{x^2}{2}+\\dfrac{x^3}{3}+\\dfrac{x^4}{4}+\\cdots\\)",
      "\\(x-\\dfrac{x^2}{2!}+\\dfrac{x^3}{3!}-\\dfrac{x^4}{4!}+\\cdots\\)",
      "\\(1-x+\\dfrac{x^2}{2}-\\dfrac{x^3}{3}+\\cdots\\)"]},

  {cat:"Series",q:"Interval of convergence for \\(\\ln(1+x)\\).",
   f:"\\(\\displaystyle\\sum_{n=1}^\\infty\\frac{(-1)^{n+1}x^n}{n}\\)",
   a:"\\(-1 < x \\leq 1\\)", d:["\\(-1\\leq x\\leq 1\\)","\\(-1<x<1\\)","\\(0<x\\leq 1\\)"]},

  // ── TRIG IDENTITIES ─────────────────────────────────────────────────────────
  {cat:"Trig Identities",q:"Pythagorean identity.",
   f:"\\(\\sin^2 x + \\cos^2 x = \\;?\\)",
   a:"\\(1\\)", d:["\\(0\\)","\\(\\sin 2x\\)","\\(2\\sin x\\cos x\\)"]},

  {cat:"Trig Identities",q:"Pythagorean identity.",
   f:"\\(1+\\tan^2 x = \\;?\\)",
   a:"\\(\\sec^2 x\\)", d:["\\(\\csc^2 x\\)","\\(\\sec x\\)","\\(\\tan^2 x+1=\\sec x\\)"]},

  {cat:"Trig Identities",q:"Pythagorean identity.",
   f:"\\(1+\\cot^2 x = \\;?\\)",
   a:"\\(\\csc^2 x\\)", d:["\\(\\sec^2 x\\)","\\(\\cot^2 x+1=\\csc x\\)","\\(\\tan^2 x\\)"]},

  {cat:"Trig Identities",q:"Double angle formula.",
   f:"\\(\\sin 2x = \\;?\\)",
   a:"\\(2\\sin x\\cos x\\)", d:["\\(\\sin^2 x-\\cos^2 x\\)","\\(2\\sin^2 x\\)","\\(\\cos^2 x-\\sin^2 x\\)"]},

  {cat:"Trig Identities",q:"Double angle formula (cosines only).",
   f:"\\(\\cos 2x = \\;?\\)",
   a:"\\(2\\cos^2 x-1\\)", d:["\\(1-2\\cos^2 x\\)","\\(2\\cos^2 x+1\\)","\\(\\cos^2 x-1\\)"]},

  {cat:"Trig Identities",q:"Double angle formula (sines only).",
   f:"\\(\\cos 2x = \\;?\\)",
   a:"\\(1-2\\sin^2 x\\)", d:["\\(2\\sin^2 x-1\\)","\\(1+2\\sin^2 x\\)","\\(\\sin^2 x-1\\)"]},

  {cat:"Trig Identities",q:"Power-reducing identity — essential for integrating \\(\\sin^2 x\\).",
   f:"\\(\\sin^2 x = \\;?\\)",
   a:"\\(\\dfrac{1-\\cos 2x}{2}\\)",
   d:["\\(\\dfrac{1+\\cos 2x}{2}\\)","\\(\\dfrac{\\cos 2x-1}{2}\\)","\\(1-\\cos^2 x\\)"]},

  {cat:"Trig Identities",q:"Power-reducing identity — essential for integrating \\(\\cos^2 x\\).",
   f:"\\(\\cos^2 x = \\;?\\)",
   a:"\\(\\dfrac{1+\\cos 2x}{2}\\)",
   d:["\\(\\dfrac{1-\\cos 2x}{2}\\)","\\(\\dfrac{\\cos 2x+1}{4}\\)","\\(1-\\sin^2 x\\)"]},

  {cat:"Trig Identities",q:"Product to single trig function.",
   f:"\\(\\sin x\\cos x = \\;?\\)",
   a:"\\(\\dfrac{\\sin 2x}{2}\\)",
   d:["\\(\\sin 2x\\)","\\(\\dfrac{\\cos 2x}{2}\\)","\\(2\\sin 2x\\)"]},

  {cat:"Trig Identities",q:"Sum formula.",
   f:"\\(\\sin(a+b) = \\;?\\)",
   a:"\\(\\sin a\\cos b + \\cos a\\sin b\\)",
   d:["\\(\\sin a\\cos b - \\cos a\\sin b\\)",
      "\\(\\cos a\\cos b - \\sin a\\sin b\\)",
      "\\(\\sin a\\sin b + \\cos a\\cos b\\)"]},

  {cat:"Trig Identities",q:"Sum formula.",
   f:"\\(\\cos(a+b) = \\;?\\)",
   a:"\\(\\cos a\\cos b - \\sin a\\sin b\\)",
   d:["\\(\\cos a\\cos b + \\sin a\\sin b\\)",
      "\\(\\sin a\\cos b - \\cos a\\sin b\\)",
      "\\(\\cos a\\sin b - \\sin a\\cos b\\)"]},

  {cat:"Trig Identities",q:"Exact value.",
   f:"\\(\\sin\\dfrac{\\pi}{4} = \\;?\\)",
   a:"\\(\\dfrac{\\sqrt{2}}{2}\\)",
   d:["\\(\\dfrac{\\sqrt{3}}{2}\\)","\\(\\dfrac{1}{2}\\)","\\(1\\)"]},

  {cat:"Trig Identities",q:"Exact value.",
   f:"\\(\\sin\\dfrac{\\pi}{3} = \\;?\\)",
   a:"\\(\\dfrac{\\sqrt{3}}{2}\\)",
   d:["\\(\\dfrac{\\sqrt{2}}{2}\\)","\\(\\dfrac{1}{2}\\)","\\(\\dfrac{\\sqrt{3}}{3}\\)"]},

  {cat:"Trig Identities",q:"Exact value.",
   f:"\\(\\cos\\dfrac{\\pi}{6} = \\;?\\)",
   a:"\\(\\dfrac{\\sqrt{3}}{2}\\)",
   d:["\\(\\dfrac{\\sqrt{2}}{2}\\)","\\(\\dfrac{1}{2}\\)","\\(1\\)"]},

  {cat:"Trig Identities",q:"Exact value.",
   f:"\\(\\tan\\dfrac{\\pi}{3} = \\;?\\)",
   a:"\\(\\sqrt{3}\\)",
   d:["\\(1\\)","\\(\\dfrac{\\sqrt{3}}{3}\\)","\\(\\dfrac{1}{\\sqrt{2}}\\)"]},

  {cat:"Trig Identities",q:"Exact value.",
   f:"\\(\\tan\\dfrac{\\pi}{6} = \\;?\\)",
   a:"\\(\\dfrac{1}{\\sqrt{3}} = \\dfrac{\\sqrt{3}}{3}\\)",
   d:["\\(\\sqrt{3}\\)","\\(1\\)","\\(\\dfrac{\\sqrt{2}}{2}\\)"]},
];

const CATS = [...new Set(Q.map(q=>q.cat))];
let activeCats = new Set(CATS);
let correct=0, wrong=0, total=0, streak=0, answered=false;
let current=null;
// milestone tracking — reset every 20 questions
let cycleCorrect=0, cycleTotal=0;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function pool(){return Q.filter(q=>activeCats.has(q.cat));}

function buildFilters(){
  const bar=document.getElementById('filter-bar');
  const allBtn=document.createElement('button');
  allBtn.className='fb on';allBtn.id='fa';allBtn.textContent='All';
  allBtn.onclick=()=>{
    activeCats=new Set(CATS);
    document.querySelectorAll('.fb').forEach(b=>b.classList.add('on'));
    next();
  };
  bar.appendChild(allBtn);
  CATS.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='fb on';btn.textContent=cat;btn.dataset.cat=cat;
    btn.onclick=()=>{
      document.getElementById('fa').classList.remove('on');
      btn.classList.toggle('on');
      if(btn.classList.contains('on')) activeCats.add(cat); else activeCats.delete(cat);
      if(activeCats.size===CATS.size) document.getElementById('fa').classList.add('on');
      next();
    };
    bar.appendChild(btn);
  });
}

function next(){
  answered=false;
  document.getElementById('next-btn').classList.remove('show');
  const fb=document.getElementById('feedback');
  fb.className='feedback';fb.innerHTML='';
  document.getElementById('ans-box').style.display='none';
  document.getElementById('ans-box').innerHTML='';

  const p=pool();
  if(!p.length) return;
  current=p[Math.floor(Math.random()*p.length)];
  const q=current;

  document.getElementById('q-cat').textContent=q.cat;
  document.getElementById('q-text').innerHTML=q.q;
  document.getElementById('q-formula').innerHTML=q.f;

  const choices=shuffle([q.a,...q.d.slice(0,3)]);
  const labels=['A','B','C','D'];
  const grid=document.getElementById('choices');
  grid.innerHTML='';
  choices.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice';
    btn.dataset.val=c;
    btn.innerHTML=`<span class="choice-lbl">${labels[i]}</span><span class="choice-math">${c}</span>`;
    btn.onclick=()=>pick(btn,c,q.a);
    grid.appendChild(btn);
  });

  // typeset new content
  if(window.MathJax && MathJax.typesetPromise){
    MathJax.typesetPromise([
      document.getElementById('q-text'),
      document.getElementById('q-formula'),
      document.getElementById('choices')
    ]).catch(()=>{});
  }

  document.getElementById('pfill').style.width=((total%20)/20*100)+'%';
}

function pick(btn,chosen,ans){
  if(answered) return;
  answered=true; total++; cycleTotal++;

  document.querySelectorAll('.choice').forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');
  const ansbox=document.getElementById('ans-box');

  if(chosen===ans){
    btn.classList.add('correct');
    fb.className='feedback cfb show';
    fb.innerHTML='✓ Correct!';
    ansbox.style.display='none';
    correct++; cycleCorrect++; streak++;
    if(streak>0&&streak%5===0) showStreak(streak);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice').forEach(b=>{
      if(b.dataset.val===ans) b.classList.add('reveal');
    });
    fb.className='feedback wfb show';
    fb.innerHTML='✗ Wrong — correct answer below:';
    ansbox.style.display='flex';
    ansbox.innerHTML=ans;
    if(window.MathJax&&MathJax.typesetPromise) MathJax.typesetPromise([ansbox]).catch(()=>{});
    wrong++; streak=0;
  }

  document.getElementById('sc').textContent=correct;
  document.getElementById('sw').textContent=wrong;
  document.getElementById('st').textContent=total;

  const cyclePos = cycleTotal % 20;
  const pct = (cyclePos / 20) * 100;
  document.getElementById('pfill').style.width = pct + '%';

  // every 20 questions — show milestone then reset cycle
  if(cycleTotal > 0 && cycleTotal % 20 === 0){
    const pctCorrect = (cycleCorrect / 20) * 100;
    // brief pause so player sees the bar hit 100%, then show overlay
    document.getElementById('pfill').style.width='100%';
    setTimeout(()=>{
      showMilestone(pctCorrect).then(()=>{
        cycleCorrect=0;
        document.getElementById('pfill').style.width='0%';
        document.getElementById('next-btn').classList.add('show');
      });
    }, 400);
    // don't show next btn yet — milestone callback handles it
    return;
  }

  document.getElementById('next-btn').classList.add('show');
}

function showStreak(n){
  const b=document.getElementById('streak-badge');
  b.textContent=n+' in a row!';b.style.display='block';
  setTimeout(()=>b.style.display='none',2500);
}

function showMilestone(pct){
  return new Promise(resolve=>{
    const ov=document.getElementById('milestone-overlay');
    const img=document.getElementById('milestone-img');
    const txt=document.getElementById('milestone-text');
    const sub=document.getElementById('milestone-sub');
    const passed=pct>=60;
    img.src=passed?THUMBS_IMG:SAD_IMG;
    txt.textContent=passed?'Nice work!':'Keep grinding';
    txt.style.color=passed?'#3ecf8e':'#f87171';
    sub.textContent=Math.round(pct)+'% correct this round';
    ov.style.display='flex';
    setTimeout(()=>{
      ov.style.display='none';
      resolve();
    },2800);
  });
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&answered){next();return;}
  if(answered) return;
  const map={'1':'A','2':'B','3':'C','4':'D','a':'A','b':'B','c':'C','d':'D'};
  const lbl=map[e.key.toLowerCase()];
  if(lbl){
    document.querySelectorAll('.choice').forEach(b=>{
      if(b.querySelector('.choice-lbl').textContent===lbl) b.click();
    });
  }
});

buildFilters();
// Wait for MathJax to be ready before first question
if(window.MathJax){
  MathJax.startup.promise.then(()=>next());
} else {
  window.addEventListener('load',next);
}
</script>
