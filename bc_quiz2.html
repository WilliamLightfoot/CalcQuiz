<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP Calc BC Formula Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script>
window.MathJax = {
  tex: { inlineMath: [['\\(','\\)'],['$','$']], displayMath: [['\\[','\\]']] },
  options: { skipHtmlTags: ['script','noscript','style','textarea'] },
  startup: { ready() { MathJax.startup.defaultReady(); } }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
<style>
:root {
  --bg:#0e0f11;--surface:#16181c;--surface2:#1e2026;--border:#2a2d35;
  --accent:#4f9eff;--accent-dim:#1a3a6a;--green:#3ecf8e;--green-dim:#0f3d28;
  --red:#f87171;--red-dim:#3d1515;--text:#e8eaf0;--text2:#8b90a0;--text3:#555a6a;
  --display:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--display);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 4rem;}
.header{width:100%;max-width:740px;display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);}
.logo{font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);}
.stats{display:flex;gap:1.5rem;font-size:13px;color:var(--text2);}
.stat-val{font-weight:700;color:var(--text);}
.stat-val.g{color:var(--green);}.stat-val.r{color:var(--red);}
.filter-bar{width:100%;max-width:740px;display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem;}
.fb{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--display);}
.fb.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.progress-bar{width:100%;max-width:740px;height:3px;background:var(--border);border-radius:2px;margin-bottom:1.5rem;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease;opacity:.5;}
.card{width:100%;max-width:740px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem 2.25rem;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);opacity:.6;}
.cat-tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);padding:3px 10px;border-radius:20px;margin-bottom:1.25rem;}
.q-text{font-size:15px;color:var(--text2);margin-bottom:.75rem;line-height:1.5;}
.formula-box{min-height:64px;display:flex;align-items:center;justify-content:center;padding:1rem 1.5rem;background:var(--surface2);border-radius:10px;border:1px solid var(--border);margin-bottom:2rem;font-size:1.15em;text-align:center;line-height:1.7;}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem;}
.choice{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:.9rem 1rem;color:var(--text);cursor:pointer;transition:border-color .15s,background .15s,transform .1s;text-align:left;line-height:1.6;font-size:.95em;}
.choice:hover:not(:disabled){border-color:var(--accent);background:#1a2030;transform:translateY(-1px);}
.choice:active:not(:disabled){transform:translateY(0);}
.choice-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--text3);display:block;margin-bottom:4px;font-family:var(--display);}
.choice.correct{border-color:var(--green);background:var(--green-dim);color:var(--green);}
.choice.correct .choice-lbl{color:var(--green);opacity:.7;}
.choice.wrong{border-color:var(--red);background:var(--red-dim);color:var(--red);}
.choice.wrong .choice-lbl{color:var(--red);opacity:.7;}
.choice.reveal{border-color:var(--green);background:var(--green-dim);color:var(--green);}
.choice.reveal .choice-lbl{color:var(--green);opacity:.7;}
.choice:disabled{cursor:default;transform:none;}
.feedback{min-height:44px;display:flex;align-items:center;gap:10px;font-size:14px;padding:.7rem 1rem;border-radius:8px;opacity:0;transition:opacity .2s;}
.feedback.show{opacity:1;}
.feedback.cfb{background:var(--green-dim);color:var(--green);}
.feedback.wfb{background:var(--red-dim);color:var(--red);}
.next-btn{display:none;margin-top:1.25rem;width:100%;padding:.85rem;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:var(--display);font-size:14px;font-weight:700;letter-spacing:.05em;cursor:pointer;transition:background .15s,transform .1s;}
.next-btn:hover{background:#3a8ef0;transform:translateY(-1px);}
.next-btn.show{display:block;}
.streak-badge{display:none;position:fixed;top:1.5rem;right:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.6rem 1rem;font-size:13px;font-weight:700;color:var(--green);animation:sin .3s ease;}
@keyframes sin{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.shake{animation:shake .35s ease;}
.mjx-container{display:inline!important;}
@media(max-width:500px){.choices{grid-template-columns:1fr;}.card{padding:1.5rem;}.formula-box{font-size:1em;}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">AP Calc BC</div>
  <div class="stats">
    <span><span class="stat-val g" id="sc">0</span> correct</span>
    <span><span class="stat-val r" id="sw">0</span> wrong</span>
    <span><span class="stat-val" id="st">0</span> total</span>
  </div>
</div>

<div class="filter-bar" id="filter-bar"></div>
<div class="progress-bar"><div class="progress-fill" id="pfill" style="width:0%"></div></div>

<div class="card">
  <div class="cat-tag" id="q-cat">Derivatives</div>
  <div class="q-text" id="q-text">Loading...</div>
  <div class="formula-box" id="q-formula"></div>
  <div class="choices" id="choices"></div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" id="next-btn" onclick="next()">Next question →</button>
</div>

<div class="streak-badge" id="streak-badge"></div>

<script>
// All questions use LaTeX for math. answer and distractors are also LaTeX where needed.
// For choice buttons we wrap in \( \) for inline math.
const Q = [
  // ── LIMITS ──────────────────────────────────────────────────────────────────
  {cat:"Limits",q:"Evaluate this special limit.",
   f:"\\(\\displaystyle\\lim_{x\\to 0}\\frac{\\sin x}{x}\\)",
   a:"\\(1\\)", d:["\\(0\\)","\\(-1\\)","undefined"]},

  {cat:"Limits",q:"Evaluate this special limit.",
   f:"\\(\\displaystyle\\lim_{x\\to 0}\\frac{1-\\cos x}{x}\\)",
   a:"\\(0\\)", d:["\\(1\\)","\\(-1\\)","\\(\\tfrac{1}{2}\\)"]},

  {cat:"Limits",q:"Evaluate this special limit.",
   f:"\\(\\displaystyle\\lim_{x\\to 0}\\frac{\\cos x - 1}{x^2}\\)",
   a:"\\(-\\tfrac{1}{2}\\)", d:["\\(\\tfrac{1}{2}\\)","\\(-1\\)","\\(0\\)"]},

  {cat:"Limits",q:"Evaluate this special limit.",
   f:"\\(\\displaystyle\\lim_{x\\to\\infty}\\left(1+\\frac{1}{x}\\right)^x\\)",
   a:"\\(e\\)", d:["\\(1\\)","\\(\\infty\\)","\\(0\\)"]},

  {cat:"Limits",q:"When does L'Hôpital's rule apply?",
   f:"\\(\\displaystyle\\lim \\frac{f(x)}{g(x)}\\)",
   a:"When the limit yields \\(\\frac{0}{0}\\) or \\(\\frac{\\pm\\infty}{\\pm\\infty}\\)",
   d:["Any limit involving a fraction","When \\(g(x)=0\\) at the point","When \\(f\\) and \\(g\\) are both positive"]},

  {cat:"Limits",q:"State the definition of the derivative.",
   f:"\\(f'(x) = \\;?\\)",
   a:"\\(\\displaystyle\\lim_{h\\to 0}\\frac{f(x+h)-f(x)}{h}\\)",
   d:["\\(\\displaystyle\\lim_{h\\to 0}\\frac{f(x+h)+f(x)}{h}\\)",
      "\\(\\displaystyle\\lim_{h\\to 0}\\frac{f(x)-f(x+h)}{h}\\)",
      "\\(\\displaystyle\\lim_{h\\to 0}\\frac{f(x+h)-f(x)}{x}\\)"]},

  {cat:"Limits",q:"State the Mean Value Theorem conclusion.",
   f:"\\(f\\) continuous on \\([a,b]\\), differentiable on \\((a,b)\\)",
   a:"\\(f'(c)=\\dfrac{f(b)-f(a)}{b-a}\\) for some \\(c\\in(a,b)\\)",
   d:["\\(f'(c)=\\dfrac{f(b)+f(a)}{b-a}\\) for some \\(c\\)",
      "\\(f(c)=\\dfrac{f(b)-f(a)}{b-a}\\) for some \\(c\\)",
      "\\(f'(c)=\\dfrac{f(b)-f(a)}{b+a}\\) for some \\(c\\)"]},

  {cat:"Limits",q:"State Rolle's Theorem conclusion.",
   f:"\\(f\\) cts on \\([a,b]\\), diff on \\((a,b)\\), \\(f(a)=f(b)\\)",
   a:"\\(f'(c)=0\\) for some \\(c\\in(a,b)\\)",
   d:["\\(f(c)=0\\) for some \\(c\\in(a,b)\\)",
      "\\(f'(c)=f(a)\\) for some \\(c\\)",
      "\\(f''(c)=0\\) for some \\(c\\in(a,b)\\)"]},

  {cat:"Limits",q:"What does the Intermediate Value Theorem guarantee?",
   f:"\\(f\\) continuous on \\([a,b]\\)",
   a:"\\(f\\) takes every value between \\(f(a)\\) and \\(f(b)\\)",
   d:["\\(f\\) attains an absolute max on \\([a,b]\\)",
      "\\(f'(c)=0\\) for some \\(c\\)",
      "\\(f(a)=f(b)\\) for some interior point"]},

  // ── DERIVATIVES — RULES ────────────────────────────────────────────────────
  {cat:"Derivatives",q:"Apply the product rule.",
   f:"\\(\\dfrac{d}{dx}[u\\cdot v]\\)",
   a:"\\(u'v + uv'\\)", d:["\\(u'v - uv'\\)","\\(u'v'\\)","\\(u'+ v'\\)"]},

  {cat:"Derivatives",q:"Apply the quotient rule.",
   f:"\\(\\dfrac{d}{dx}\\!\\left[\\dfrac{u}{v}\\right]\\)",
   a:"\\(\\dfrac{u'v - uv'}{v^2}\\)",
   d:["\\(\\dfrac{u'v + uv'}{v^2}\\)","\\(\\dfrac{uv' - u'v}{v^2}\\)","\\(\\dfrac{u'v - uv'}{v}\\)"]},

  {cat:"Derivatives",q:"Apply the chain rule.",
   f:"\\(\\dfrac{d}{dx}[f(g(x))]\\)",
   a:"\\(f'(g(x))\\cdot g'(x)\\)",
   d:["\\(f'(g(x))\\cdot f'(x)\\)","\\(f(g'(x))\\cdot g'(x)\\)","\\(f'(g(x)) + g'(x)\\)"]},

  {cat:"Derivatives",q:"Inverse function derivative formula.",
   f:"\\((f^{-1})'(a) = \\;?\\)",
   a:"\\(\\dfrac{1}{f'(f^{-1}(a))}\\)",
   d:["\\(\\dfrac{1}{f'(a)}\\)","\\(f'(f^{-1}(a))\\)","\\(\\dfrac{-1}{f'(f^{-1}(a))}\\)"]},

  {cat:"Derivatives",q:"Logarithmic differentiation — what do you do first?",
   f:"\\(y = f(x)^{g(x)}\\)",
   a:"Take \\(\\ln\\) of both sides, then differentiate implicitly",
   d:["Apply the power rule directly","Use the chain rule on the exponent only","Rewrite using \\(e^{g(x)\\ln f(x)}\\) then stop"]},

  // ── DERIVATIVES — TRIG ─────────────────────────────────────────────────────
  {cat:"Derivatives",q:"Differentiate.",
   f:"\\(\\dfrac{d}{dx}[\\tan u]\\)",
   a:"\\(\\sec^2 u\\cdot u'\\)", d:["\\(\\sec u\\tan u\\cdot u'\\)","\\(-\\csc^2 u\\cdot u'\\)","\\(\\sec^2 u\\)"]},

  {cat:"Derivatives",q:"Differentiate.",
   f:"\\(\\dfrac{d}{dx}[\\sec u]\\)",
   a:"\\(\\sec u\\tan u\\cdot u'\\)", d:["\\(\\sec^2 u\\cdot u'\\)","\\(-\\sec u\\tan u\\cdot u'\\)","\\(\\csc u\\cot u\\cdot u'\\)"]},

  {cat:"Derivatives",q:"Differentiate.",
   f:"\\(\\dfrac{d}{dx}[\\cot u]\\)",
   a:"\\(-\\csc^2 u\\cdot u'\\)", d:["\\(\\csc^2 u\\cdot u'\\)","\\(\\sec^2 u\\cdot u'\\)","\\(-\\sec^2 u\\cdot u'\\)"]},

  {cat:"Derivatives",q:"Differentiate.",
   f:"\\(\\dfrac{d}{dx}[\\csc u]\\)",
   a:"\\(-\\csc u\\cot u\\cdot u'\\)", d:["\\(\\csc u\\cot u\\cdot u'\\)","\\(-\\sec u\\tan u\\cdot u'\\)","\\(\\csc u\\tan u\\cdot u'\\)"]},

  // ── DERIVATIVES — INVERSE TRIG ─────────────────────────────────────────────
  {cat:"Derivatives",q:"Differentiate (chain rule included).",
   f:"\\(\\dfrac{d}{dx}[\\arcsin u]\\)",
   a:"\\(\\dfrac{u'}{\\sqrt{1-u^2}}\\)",
   d:["\\(\\dfrac{u'}{\\sqrt{1+u^2}}\\)","\\(\\dfrac{-u'}{\\sqrt{1-u^2}}\\)","\\(\\dfrac{u'}{1+u^2}\\)"]},

  {cat:"Derivatives",q:"Differentiate (chain rule included).",
   f:"\\(\\dfrac{d}{dx}[\\arccos u]\\)",
   a:"\\(\\dfrac{-u'}{\\sqrt{1-u^2}}\\)",
   d:["\\(\\dfrac{u'}{\\sqrt{1-u^2}}\\)","\\(\\dfrac{-u'}{\\sqrt{1+u^2}}\\)","\\(\\dfrac{-u'}{1+u^2}\\)"]},

  {cat:"Derivatives",q:"Differentiate (chain rule included).",
   f:"\\(\\dfrac{d}{dx}[\\arctan u]\\)",
   a:"\\(\\dfrac{u'}{1+u^2}\\)",
   d:["\\(\\dfrac{u'}{1-u^2}\\)","\\(\\dfrac{u'}{\\sqrt{1+u^2}}\\)","\\(\\dfrac{-u'}{1+u^2}\\)"]},

  {cat:"Derivatives",q:"Differentiate (chain rule included).",
   f:"\\(\\dfrac{d}{dx}[\\text{arcsec}\\, u]\\)",
   a:"\\(\\dfrac{u'}{|u|\\sqrt{u^2-1}}\\)",
   d:["\\(\\dfrac{u'}{u\\sqrt{u^2-1}}\\)","\\(\\dfrac{u'}{|u|\\sqrt{1-u^2}}\\)","\\(\\dfrac{-u'}{|u|\\sqrt{u^2-1}}\\)"]},

  // ── DERIVATIVES — EXP & LOG ─────────────────────────────────────────────────
  {cat:"Derivatives",q:"Differentiate.",
   f:"\\(\\dfrac{d}{dx}[a^u]\\)",
   a:"\\(a^u \\ln a\\cdot u'\\)", d:["\\(a^u\\cdot u'\\)","\\(u\\cdot a^{u-1}\\cdot u'\\)","\\(\\dfrac{a^u}{\\ln a}\\cdot u'\\)"]},

  {cat:"Derivatives",q:"Differentiate.",
   f:"\\(\\dfrac{d}{dx}[\\log_a u]\\)",
   a:"\\(\\dfrac{u'}{u\\ln a}\\)", d:["\\(\\dfrac{u'}{u}\\)","\\(\\dfrac{u'\\ln a}{u}\\)","\\(\\dfrac{1}{u\\ln a}\\)"]},

  // ── DERIVATIVES — ANALYSIS ──────────────────────────────────────────────────
  {cat:"Derivatives",q:"What does \\(f''(x)>0\\) mean?",
   f:"Second derivative and concavity",
   a:"\\(f\\) is concave up", d:["\\(f\\) is concave down","\\(f\\) has a local minimum at \\(x\\)","\\(f\\) is increasing"]},

  {cat:"Derivatives",q:"When does an inflection point occur at \\(x=c\\)?",
   f:"Inflection point condition",
   a:"\\(f''\\) changes sign at \\(x=c\\)",
   d:["\\(f''(c)=0\\)","\\(f'(c)=0\\)","\\(f''(c)>0\\)"]},

  {cat:"Derivatives",q:"Linearization of \\(f\\) near \\(x=a\\).",
   f:"\\(L(x) = \\;?\\)",
   a:"\\(f(a)+f'(a)(x-a)\\)",
   d:["\\(f(a)+f''(a)(x-a)\\)","\\(f(a)-f'(a)(x-a)\\)","\\(f'(a)+f(a)(x-a)\\)"]},

  // ── INTEGRALS — FTC ─────────────────────────────────────────────────────────
  {cat:"Integrals",q:"Apply FTC Part 1 with the chain rule.",
   f:"\\(\\dfrac{d}{dx}\\displaystyle\\int_a^{g(x)}f(t)\\,dt\\)",
   a:"\\(f(g(x))\\cdot g'(x)\\)",
   d:["\\(f(g(x))\\)","\\(f'(g(x))\\cdot g'(x)\\)","\\(f(g(x))+g'(x)\\)"]},

  {cat:"Integrals",q:"State the Net Change Theorem.",
   f:"\\(\\displaystyle\\int_a^b f'(x)\\,dx = \\;?\\)",
   a:"\\(f(b)-f(a)\\)", d:["\\(f'(b)-f'(a)\\)","\\(f(a)-f(b)\\)","\\(f(b)+f(a)\\)"]},

  // ── INTEGRALS — BASIC ───────────────────────────────────────────────────────
  {cat:"Integrals",q:"Evaluate the antiderivative.",
   f:"\\(\\displaystyle\\int \\tan x\\,dx\\)",
   a:"\\(\\ln|\\sec x|+C\\)",
   d:["\\(\\ln|\\cos x|+C\\)","\\(-\\ln|\\cos x|+C\\)","\\(\\sec^2 x+C\\)"]},

  {cat:"Integrals",q:"Evaluate the antiderivative.",
   f:"\\(\\displaystyle\\int \\sec x\\,dx\\)",
   a:"\\(\\ln|\\sec x+\\tan x|+C\\)",
   d:["\\(\\ln|\\sec x-\\tan x|+C\\)","\\(\\sec x\\tan x+C\\)","\\(\\ln|\\tan x|+C\\)"]},

  {cat:"Integrals",q:"Evaluate the antiderivative.",
   f:"\\(\\displaystyle\\int \\cot x\\,dx\\)",
   a:"\\(\\ln|\\sin x|+C\\)",
   d:["\\(-\\ln|\\sin x|+C\\)","\\(\\ln|\\cos x|+C\\)","\\(-\\csc^2 x+C\\)"]},

  {cat:"Integrals",q:"Evaluate the antiderivative.",
   f:"\\(\\displaystyle\\int \\csc x\\,dx\\)",
   a:"\\(-\\ln|\\csc x+\\cot x|+C\\)",
   d:["\\(\\ln|\\csc x+\\cot x|+C\\)","\\(-\\ln|\\csc x-\\cot x|+C\\)","\\(\\csc x\\cot x+C\\)"]},

  {cat:"Integrals",q:"Evaluate the antiderivative.",
   f:"\\(\\displaystyle\\int a^x\\,dx\\)",
   a:"\\(\\dfrac{a^x}{\\ln a}+C\\)",
   d:["\\(a^x\\ln a+C\\)","\\(a^x+C\\)","\\(x\\cdot a^{x-1}+C\\)"]},

  // ── INTEGRALS — INVERSE TRIG ────────────────────────────────────────────────
  {cat:"Integrals",q:"Evaluate the antiderivative.",
   f:"\\(\\displaystyle\\int\\frac{du}{\\sqrt{a^2-u^2}}\\)",
   a:"\\(\\arcsin\\!\\left(\\dfrac{u}{a}\\right)+C\\)",
   d:["\\(\\arctan\\!\\left(\\dfrac{u}{a}\\right)+C\\)",
      "\\(\\dfrac{1}{a}\\arcsin\\!\\left(\\dfrac{u}{a}\\right)+C\\)",
      "\\(\\arcsin(u)+C\\)"]},

  {cat:"Integrals",q:"Evaluate the antiderivative.",
   f:"\\(\\displaystyle\\int\\frac{du}{a^2+u^2}\\)",
   a:"\\(\\dfrac{1}{a}\\arctan\\!\\left(\\dfrac{u}{a}\\right)+C\\)",
   d:["\\(\\arctan\\!\\left(\\dfrac{u}{a}\\right)+C\\)",
      "\\(\\dfrac{1}{a}\\arctan(u)+C\\)",
      "\\(\\dfrac{1}{a^2}\\arctan\\!\\left(\\dfrac{u}{a}\\right)+C\\)"]},

  // ── INTEGRALS — TECHNIQUES ──────────────────────────────────────────────────
  {cat:"Integrals",q:"State the integration by parts formula.",
   f:"\\(\\displaystyle\\int u\\,dv = \\;?\\)",
   a:"\\(uv - \\displaystyle\\int v\\,du\\)",
   d:["\\(uv + \\displaystyle\\int v\\,du\\)","\\(u'v - \\displaystyle\\int v\\,du\\)","\\(uv - \\displaystyle\\int u\\,dv\\)"]},

  {cat:"Integrals",q:"In LIATE, which type of function should be chosen as \\(u\\) first?",
   f:"LIATE priority order",
   a:"Logarithmic (comes first in LIATE)",
   d:["Exponential (comes last in LIATE)","Trigonometric","Algebraic (polynomial)"]},

  // ── INTEGRALS — PROPERTIES ──────────────────────────────────────────────────
  {cat:"Integrals",q:"Evaluate using symmetry.",
   f:"\\(\\displaystyle\\int_{-a}^{a}f(x)\\,dx\\) where \\(f\\) is odd",
   a:"\\(0\\)",
   d:["\\(2\\displaystyle\\int_0^a f(x)\\,dx\\)","\\(\\displaystyle\\int_0^a f(x)\\,dx\\)","Cannot be determined"]},

  {cat:"Integrals",q:"Evaluate using symmetry.",
   f:"\\(\\displaystyle\\int_{-a}^{a}f(x)\\,dx\\) where \\(f\\) is even",
   a:"\\(2\\displaystyle\\int_0^a f(x)\\,dx\\)",
   d:["\\(0\\)","\\(\\displaystyle\\int_0^a f(x)\\,dx\\)","\\(-2\\displaystyle\\int_0^a f(x)\\,dx\\)"]},

  {cat:"Integrals",q:"Split the integral at an interior point.",
   f:"\\(\\displaystyle\\int_a^b f\\,dx = \\;?\\)",
   a:"\\(\\displaystyle\\int_a^c f\\,dx + \\int_c^b f\\,dx\\)",
   d:["\\(\\displaystyle\\int_a^c f\\,dx - \\int_c^b f\\,dx\\)",
      "\\(\\displaystyle\\int_a^c f\\,dx \\cdot \\int_c^b f\\,dx\\)",
      "\\(\\displaystyle\\int_c^a f\\,dx + \\int_b^c f\\,dx\\)"]},

  // ── APPLICATIONS ────────────────────────────────────────────────────────────
  {cat:"Applications",q:"Average value of \\(f\\) on \\([a,b]\\).",
   f:"\\(f_{\\text{avg}} = \\;?\\)",
   a:"\\(\\dfrac{1}{b-a}\\displaystyle\\int_a^b f(x)\\,dx\\)",
   d:["\\(\\dfrac{1}{b+a}\\displaystyle\\int_a^b f(x)\\,dx\\)",
      "\\(\\displaystyle\\int_a^b f(x)\\,dx \\div b\\)",
      "\\((b-a)\\displaystyle\\int_a^b f(x)\\,dx\\)"]},

  {cat:"Applications",q:"Total distance traveled by a particle.",
   f:"velocity \\(v(t)\\) on \\([a,b]\\)",
   a:"\\(\\displaystyle\\int_a^b |v(t)|\\,dt\\)",
   d:["\\(\\displaystyle\\int_a^b v(t)\\,dt\\)",
      "\\(v(b)-v(a)\\)",
      "\\(\\left|\\displaystyle\\int_a^b v(t)\\,dt\\right|\\)"]},

  {cat:"Applications",q:"How do you find position from velocity?",
   f:"\\(x(t) = \\;?\\)",
   a:"\\(x(t_0)+\\displaystyle\\int_{t_0}^{t}v(s)\\,ds\\)",
   d:["\\(\\displaystyle\\int_{t_0}^{t}|v(s)|\\,ds\\)",
      "\\(v(t)-v(t_0)\\)",
      "\\(x(t_0)\\cdot v(t)\\)"]},

  {cat:"Applications",q:"When is a particle speeding up?",
   f:"velocity \\(v(t)\\), acceleration \\(a(t)\\)",
   a:"When \\(v(t)\\) and \\(a(t)\\) have the same sign",

let correct=0, wrong=0, total=0, streak=0, answered=false;
let current=null;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function pool(){return Q.filter(q=>activeCats.has(q.cat));}

function buildFilters(){
  const bar=document.getElementById('filter-bar');
  const allBtn=document.createElement('button');
  allBtn.className='fb on';allBtn.id='fa';allBtn.textContent='All';
  allBtn.onclick=()=>{
    activeCats=new Set(CATS);
    document.querySelectorAll('.fb').forEach(b=>b.classList.add('on'));
    next();
  };
  bar.appendChild(allBtn);
  CATS.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='fb on';btn.textContent=cat;btn.dataset.cat=cat;
    btn.onclick=()=>{
      document.getElementById('fa').classList.remove('on');
      btn.classList.toggle('on');
      if(btn.classList.contains('on')) activeCats.add(cat); else activeCats.delete(cat);
      if(activeCats.size===CATS.size) document.getElementById('fa').classList.add('on');
      next();
    };
    bar.appendChild(btn);
  });
}

function next(){
  answered=false;
  document.getElementById('next-btn').classList.remove('show');
  const fb=document.getElementById('feedback');
  fb.className='feedback';fb.innerHTML='';

  const p=pool();
  if(!p.length) return;
  current=p[Math.floor(Math.random()*p.length)];
  const q=current;

  document.getElementById('q-cat').textContent=q.cat;
  document.getElementById('q-text').innerHTML=q.q;
  document.getElementById('q-formula').innerHTML=q.f;

  const choices=shuffle([q.a,...q.d.slice(0,3)]);
  const labels=['A','B','C','D'];
  const grid=document.getElementById('choices');
  grid.innerHTML='';
  choices.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice';
    btn.innerHTML=`<span class="choice-lbl">${labels[i]}</span><span class="choice-math">${c}</span>`;
    btn.onclick=()=>pick(btn,c,q.a);
    grid.appendChild(btn);
  });

  // typeset new content
  if(window.MathJax && MathJax.typesetPromise){
    MathJax.typesetPromise([
      document.getElementById('q-text'),
      document.getElementById('q-formula'),
      document.getElementById('choices')
    ]).catch(()=>{});
  }

  document.getElementById('pfill').style.width=((total%20)/20*100)+'%';
}

function pick(btn,chosen,ans){
  if(answered) return;
  answered=true; total++;

  document.querySelectorAll('.choice').forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');

  if(chosen===ans){
    btn.classList.add('correct');
    fb.className='feedback cfb show';
    fb.innerHTML='✓ Correct!';
    correct++; streak++;
    if(streak>0&&streak%5===0) showStreak(streak);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice').forEach(b=>{
      if(b.querySelector('.choice-math').innerHTML===ans) b.classList.add('reveal');
    });
    fb.className='feedback wfb show';
    fb.innerHTML='✗ Correct answer: '+ans;
    if(window.MathJax&&MathJax.typesetPromise) MathJax.typesetPromise([fb]).catch(()=>{});
    wrong++; streak=0;
  }

  document.getElementById('sc').textContent=correct;
  document.getElementById('sw').textContent=wrong;
  document.getElementById('st').textContent=total;
  document.getElementById('pfill').style.width=((total%20)/20*100)+'%';
  document.getElementById('next-btn').classList.add('show');
}

function showStreak(n){
  const b=document.getElementById('streak-badge');
  b.textContent=n+' in a row!';b.style.display='block';
  setTimeout(()=>b.style.display='none',2500);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&answered){next();return;}
  if(answered) return;
  const map={'1':'A','2':'B','3':'C','4':'D','a':'A','b':'B','c':'C','d':'D'};
  const lbl=map[e.key.toLowerCase()];
  if(lbl){
    document.querySelectorAll('.choice').forEach(b=>{
      if(b.querySelector('.choice-lbl').textContent===lbl) b.click();
    });
  }
});

buildFilters();
// Wait for MathJax to be ready before first question
if(window.MathJax){
  MathJax.startup.promise.then(()=>next());
} else {
  window.addEventListener('load',next);
}
</script>
</body>
</html>
